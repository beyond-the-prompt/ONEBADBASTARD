<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ONLY-US</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #080909;
  --panel: #111315;
  --metal: #d5d8dd;
  --blood: #d41010;
}

body {
  background:
    radial-gradient(circle at top, rgba(255,0,0,.12), transparent 40%),
    linear-gradient(180deg, #0a0b0d 0%, #060707 100%);
  color: white;
  font-family: Orbitron, sans-serif;
  min-height: 100vh;
}

#app {
  display: grid;
  grid-template-columns: 320px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: linear-gradient(180deg, #121416, #090a0b);
  border-right: 2px solid #2c2f34;
  padding: 22px;
}

.logo {
  font-family: Cinzel, serif;
  font-size: 44px;
  font-weight: 900;
  color: var(--metal);
  margin-bottom: 8px;
}

.tag {
  color: #777;
  margin-bottom: 30px;
  font-size: 12px;
}

.panel {
  background: linear-gradient(180deg, #181b20, #111214);
  border: 1px solid #333;
  padding: 16px;
  margin-bottom: 18px;
}

.label {
  font-size: 12px;
  color: #999;
  margin-bottom: 10px;
  text-transform: uppercase;
}

input {
  width: 100%;
  background: #090909;
  border: 1px solid #3b3b3b;
  color: white;
  padding: 14px;
  font-family: Orbitron;
  margin-bottom: 12px;
}

button {
  width: 100%;
  border: none;
  cursor: pointer;
  padding: 14px;
  font-family: Orbitron;
  font-weight: 700;
  text-transform: uppercase;
}

.btn-red {
  background: linear-gradient(180deg, #ff2525, #8f0000);
  color: white;
}

.btn-dark {
  background: linear-gradient(180deg, #2c3138, #15181c);
  color: white;
  border: 1px solid #444;
}

.main {
  display: grid;
  grid-template-rows: 1fr 280px;
  gap: 14px;
  padding: 14px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 14px;
}

.video-box {
  background: #111;
  border: 2px solid #2b2e34;
  position: relative;
  min-height: 300px;
}

.video-title {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,.8);
  padding: 8px 12px;
  font-size: 12px;
  z-index: 5;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: black;
}

.bottom {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 14px;
}

.chat {
  background: #101214;
  border: 1px solid #333;
  display: flex;
  flex-direction: column;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.msg {
  background: #1b1e23;
  border-left: 4px solid var(--blood);
  padding: 10px;
  margin-bottom: 10px;
  word-break: break-word;
}

.msg.self {
  border-left-color: #777;
}

.chat-controls {
  display: flex;
}

.chat-controls input {
  margin: 0;
}

.chat-controls button {
  width: 120px;
}

.tools {
  background: #111315;
  border: 1px solid #333;
  padding: 14px;
}

.tool-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.tool-row button {
  flex: 1;
}

.status {
  font-size: 12px;
  color: #aaa;
  line-height: 1.6;
}

.file-item {
  background: #1b1d21;
  margin-top: 10px;
  padding: 10px;
}

.notice {
  background: rgba(255,0,0,.1);
  border: 1px solid rgba(255,0,0,.4);
  padding: 10px;
  margin-bottom: 15px;
  font-size: 12px;
  line-height: 1.6;
}

a {
  color: #ff4b4b;
}

@media (max-width: 900px) {
  #app {
    grid-template-columns: 1fr;
  }

  .bottom {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div id="app">

  <div class="sidebar">

    <div class="logo">ONLY-US</div>
    <div class="tag">BRUTAL P2P COMMUNICATION SYSTEM</div>

    <div class="notice">
      Camera/mic permissions require HTTPS or localhost.<br><br>
      Recommended testing:<br>
      • localhost<br>
      • Vercel<br>
      • Netlify<br>
      • GitHub Pages
    </div>

    <div class="panel">
      <div class="label">Forge Room</div>
      <input id="roomInput" placeholder="ROOM ID" readonly />
      <button class="btn-red" id="createRoomBtn">START SESSION</button>
    </div>

    <div class="panel">
      <div class="label">Invite Link</div>
      <input id="inviteInput" readonly />
      <button class="btn-dark" id="copyInviteBtn">COPY INVITE</button>
    </div>

    <div class="panel">
      <div class="label">Status</div>
      <div class="status" id="status">Idle</div>
    </div>

  </div>

  <div class="main">

    <div class="video-grid">

      <div class="video-box">
        <div class="video-title">LOCAL FEED</div>
        <video id="localVideo" autoplay playsinline muted></video>
      </div>

      <div class="video-box">
        <div class="video-title">REMOTE FEED</div>
        <video id="remoteVideo" autoplay playsinline></video>
      </div>

    </div>

    <div class="bottom">

      <div class="chat">

        <div class="messages" id="messages"></div>

        <div class="chat-controls">
          <input id="messageInput" placeholder="TRANSMIT MESSAGE" />
          <button class="btn-red" id="sendBtn">SEND</button>
        </div>

      </div>

      <div class="tools">

        <div class="tool-row">
          <button class="btn-dark" id="toggleMicBtn">MIC</button>
          <button class="btn-dark" id="toggleCamBtn">CAM</button>
        </div>

        <div class="tool-row">
          <button class="btn-dark" id="shareScreenBtn">SCREEN</button>
          <button class="btn-dark" id="fileBtn">FILE</button>
        </div>

        <input type="file" id="fileInput" hidden />

        <div id="files"></div>

      </div>

    </div>

  </div>

</div>

<script type="module">
import { joinRoom } from 'https://esm.sh/trystero@0.20.1';

const roomInput = document.getElementById('roomInput');
const inviteInput = document.getElementById('inviteInput');
const createRoomBtn = document.getElementById('createRoomBtn');
const copyInviteBtn = document.getElementById('copyInviteBtn');
const localVideo = document.getElementById('localVideo');
const remoteVideo = document.getElementById('remoteVideo');
const messages = document.getElementById('messages');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const toggleMicBtn = document.getElementById('toggleMicBtn');
const toggleCamBtn = document.getElementById('toggleCamBtn');
const shareScreenBtn = document.getElementById('shareScreenBtn');
const fileBtn = document.getElementById('fileBtn');
const fileInput = document.getElementById('fileInput');
const files = document.getElementById('files');
const statusEl = document.getElementById('status');

let room = null;
let currentRoomId = null;
let localStream = null;
let micEnabled = true;
let camEnabled = true;

const config = {
  appId: 'only-us-metal-p2p'
};

function setStatus(msg) {
  statusEl.innerHTML = msg;
}

function addMessage(text, self = false) {
  const div = document.createElement('div');
  div.className = 'msg' + (self ? ' self' : '');
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addFileLink(file) {
  const url = URL.createObjectURL(file);

  const div = document.createElement('div');
  div.className = 'file-item';

  const a = document.createElement('a');
  a.href = url;
  a.download = file.name;
  a.textContent = 'DOWNLOAD: ' + file.name;

  div.appendChild(a);
  files.appendChild(div);
}

function isSecureContextValid() {
  return window.isSecureContext || location.hostname === 'localhost';
}

async function initMedia() {

  if (!isSecureContextValid()) {
    setStatus('ERROR: Camera/mic require HTTPS or localhost');
    return false;
  }

  try {

    localStream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });

    localVideo.srcObject = localStream;

    setStatus('Camera and microphone initialized');

    return true;

  } catch (err) {

    console.error(err);

    if (err.name === 'NotAllowedError') {
      setStatus('Permission denied. Allow camera/mic access and reload.');
    } else if (err.name === 'NotFoundError') {
      setStatus('No camera or microphone found.');
    } else {
      setStatus('Media error: ' + err.message);
    }

    return false;
  }
}

async function createOrJoinRoom(roomId) {

  if (room) {
    setStatus('Already connected to room');
    return;
  }

  const mediaReady = await initMedia();

  if (!mediaReady) {
    return;
  }

  room = joinRoom(config, roomId);

  const [sendMessage, getMessage] = room.makeAction('message');
  const [sendFile, getFile] = room.makeAction('file');

  window.sendMessageP2P = sendMessage;
  window.sendFileP2P = sendFile;

  room.onPeerJoin(async peerId => {

    setStatus('Peer connected: ' + peerId);

    try {
      await room.addStream(localStream, peerId);
    } catch (err) {
      console.error(err);
    }
  });

  room.onPeerLeave(peerId => {
    setStatus('Peer disconnected');
  });

  room.onPeerStream((stream, peerId) => {
    remoteVideo.srcObject = stream;
    setStatus('Encrypted WebRTC stream active');
  });

  getMessage((data, peerId) => {
    addMessage('REMOTE: ' + data.text);
  });

  getFile((file, peerId) => {
    addFileLink(file);
    addMessage('REMOTE FILE: ' + file.name);
  });

  inviteInput.value = `${location.origin}${location.pathname}#${roomId}`;

  setStatus('ROOM LINKED • Awaiting peer connection');
}

createRoomBtn.onclick = async () => {

  let roomId = location.hash.replace('#', '').trim();

  if (!roomId) {
    roomId = crypto.randomUUID().replace(/-/g, '').slice(0, 12);
    location.hash = roomId;
  }

  currentRoomId = roomId;

  roomInput.value = roomId;

  const inviteURL = `${location.origin}${location.pathname}#${roomId}`;

  inviteInput.value = inviteURL;

  await createOrJoinRoom(roomId);

  try {
    await navigator.clipboard.writeText(inviteURL);
    setStatus('SESSION ACTIVE • Invite copied automatically');
  } catch (err) {
    setStatus('SESSION ACTIVE • Copy invite manually');
  }
};

copyInviteBtn.onclick = async () => {

  if (!inviteInput.value) {
    setStatus('Create room first');
    return;
  }

  try {
    await navigator.clipboard.writeText(inviteInput.value);
    setStatus('Invite copied');
  } catch (err) {
    setStatus('Clipboard access blocked');
  }
};

sendBtn.onclick = () => {

  const text = messageInput.value.trim();

  if (!text) return;

  if (!window.sendMessageP2P) {
    setStatus('No active room');
    return;
  }

  window.sendMessageP2P({ text });

  addMessage('YOU: ' + text, true);

  messageInput.value = '';
};

messageInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    sendBtn.click();
  }
});

toggleMicBtn.onclick = () => {

  if (!localStream) {
    setStatus('Join room first');
    return;
  }

  micEnabled = !micEnabled;

  localStream.getAudioTracks().forEach(track => {
    track.enabled = micEnabled;
  });

  toggleMicBtn.textContent = micEnabled ? 'MIC ON' : 'MIC OFF';
};

toggleCamBtn.onclick = () => {

  if (!localStream) {
    setStatus('Join room first');
    return;
  }

  camEnabled = !camEnabled;

  localStream.getVideoTracks().forEach(track => {
    track.enabled = camEnabled;
  });

  toggleCamBtn.textContent = camEnabled ? 'CAM ON' : 'CAM OFF';
};

shareScreenBtn.onclick = async () => {

  if (!room) {
    setStatus('Join room first');
    return;
  }

  try {

    const displayStream = await navigator.mediaDevices.getDisplayMedia({
      video: true
    });

    localVideo.srcObject = displayStream;

    await room.addStream(displayStream);

    const track = displayStream.getVideoTracks()[0];

    track.onended = async () => {
      localVideo.srcObject = localStream;
      await room.addStream(localStream);
    };

    setStatus('Screen sharing active');

  } catch (err) {
    setStatus('Screen share denied');
  }
};

fileBtn.onclick = () => {

  if (!room) {
    setStatus('Join room first');
    return;
  }

  fileInput.click();
};

fileInput.onchange = () => {

  const file = fileInput.files[0];

  if (!file) return;

  if (!window.sendFileP2P) {
    setStatus('No active room');
    return;
  }

  window.sendFileP2P(file);

  addFileLink(file);
  addMessage('YOU SENT FILE: ' + file.name, true);
};

function bootstrapRoom() {

  let roomId = location.hash.replace('#', '').trim();

  if (!roomId) {
    roomId = crypto.randomUUID().replace(/-/g, '').slice(0, 12);
    location.hash = roomId;
  }

  currentRoomId = roomId;

  roomInput.value = roomId;

  inviteInput.value = `${location.origin}${location.pathname}#${roomId}`;

  setStatus('READY • Share invite and press START SESSION');
}

window.addEventListener('hashchange', () => {
  location.reload();
});

bootstrapRoom();

addMessage('SYSTEM TEST: Local UI initialized');
addMessage('SYSTEM TEST: Messaging panel operational');

</script>

</body>
</html>
